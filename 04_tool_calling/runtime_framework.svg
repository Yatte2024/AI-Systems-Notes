<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#F8FAFC"/>

  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0F172A">
    Tool Calling Runtime Framework
  </text>
  <text x="600" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">
    The model/router creates a structured ToolCall. The executor decides how to run it.
  </text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="80" y="185" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="170" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#0F172A">User Query</text>
  <text x="170" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">natural language</text>

  <line x1="260" y1="225" x2="340" y2="225" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="345" y="185" width="210" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="450" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">workflow_demo.py</text>
  <text x="450" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">run_workflow()</text>

  <line x1="555" y1="225" x2="635" y2="225" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="640" y="185" width="230" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="755" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">mock_llm_router.py</text>
  <text x="755" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">route_query()</text>

  <line x1="870" y1="225" x2="945" y2="225" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="950" y="185" width="180" height="80" rx="8" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="1040" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">ToolCall</text>
  <text x="1040" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#075985">{ tool, arguments }</text>

  <line x1="1040" y1="265" x2="1040" y2="335" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="930" y="340" width="220" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="1040" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">tool_executor.py</text>
  <text x="1040" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">execute_tool()</text>

  <line x1="930" y1="380" x2="855" y2="380" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="625" y="340" width="230" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="740" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">tool_registry.py</text>
  <text x="740" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">TOOLS dictionary</text>

  <line x1="625" y1="380" x2="550" y2="380" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="330" y="320" width="220" height="120" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="440" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">tools.py</text>
  <text x="440" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">search_web()</text>
  <text x="440" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">calculator()</text>
  <text x="440" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">verify_claim()</text>

  <line x1="440" y1="440" x2="440" y2="510" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="335" y="515" width="210" height="80" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="440" y="544" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">ToolResult</text>
  <text x="440" y="572" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">{ success, output, error }</text>

  <line x1="545" y1="555" x2="640" y2="555" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="645" y="515" width="230" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="760" y="544" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">workflow_demo.py</text>
  <text x="760" y="572" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748B">print result</text>

  <text x="600" y="665" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">
    The model chooses an action. The system controls execution.
  </text>
</svg>
